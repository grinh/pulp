<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulp Cthulhu - Kreator Postaci v1.10</title>
<style>
  :root {
    --bg-color: #1a1a1a;
    --panel-bg: #2a2a2a;
    --text-main: #d4d4d4;
    --accent: #e0a96d;
    --good: #a3d9a5;
    --arch-color: #9d7bd8;
    --occ-color: #5c9bcf;
    --danger: #ff6b6b;
    --tag-color: #888;
  }
  
  body { 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
    background-color: var(--bg-color); 
    color: var(--text-main); 
    padding: 20px; 
    margin: 0;
  }
  
  .container { 
    max-width: 1300px; 
    margin: 0 auto; 
    background: var(--panel-bg); 
    padding: 30px; 
    border-radius: 10px; 
    box-shadow: 0 5px 25px rgba(0,0,0,0.8); 
  }
  
  h1 { text-align: center; color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 2px; }
  h2 { color: var(--accent); font-size: 1.3em; margin-top: 0; }
  
  .tools-header { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
  .btn { padding: 10px 20px; background: var(--accent); color: #111; border: none; border-radius: 5px; font-weight: bold; font-size: 1em; cursor: pointer; transition: 0.2s; }
  .btn:hover { background: #d0985c; transform: translateY(-2px); }
  .btn-outline { background: transparent; color: var(--accent); border: 2px solid var(--accent); }
  .btn-outline:hover { background: rgba(224, 169, 109, 0.1); }

  .grid { display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px; }
  
  .sticky-header { position: sticky; top: 0; background: var(--panel-bg); padding-bottom: 15px; z-index: 10; border-bottom: 1px solid #444; margin-bottom: 15px; }

  .pool-display { font-size: 1.1em; color: var(--good); background: #111; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #333; margin-bottom: 15px;}
  .pool-display span { font-weight: bold; font-size: 1.2em; }
  .pool-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  
  .box { background: #1a1a1a; padding: 15px; border: 1px solid #444; border-radius: 6px; margin-bottom: 20px; }
  select { width: 100%; padding: 10px; background: #333; color: white; border: 1px solid var(--accent); border-radius: 4px; font-size: 1.1em; margin-bottom: 10px;}
  .desc { font-size: 0.9em; line-height: 1.5; color: #bbb; }
  .desc-accent { color: var(--accent); display: block; margin-top: 8px; font-weight: bold; font-size: 0.9em; }
  .desc-occ { color: var(--occ-color); display: block; margin-top: 8px; font-weight: bold; font-size: 0.9em; }
  
  .occ-choice-box { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #555; }
  .occ-choice-box label { font-size: 0.9em; color: var(--occ-color); display: block; margin-bottom: 5px; }
  .occ-choice-box select { margin-bottom: 0; border-color: var(--occ-color); }

  .mode-selector { background: #111; padding: 10px; border-radius: 6px; display: flex; justify-content: space-around; border: 1px solid var(--accent); margin-bottom: 20px;}
  .mode-selector label { cursor: pointer; font-weight: bold; font-size:0.9em;}
  .mode-selector input[type="radio"] { accent-color: var(--accent); transform: scale(1.2); margin-right: 5px;}

  .stat-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; background: #333; padding: 8px 15px; border-radius: 5px; }
  .special-row { border: 2px solid var(--accent); background: #222;}
  
  .skill-label { display: flex; flex-direction: column; }
  .skill-name { font-size: 0.95em; }
  .skill-meta { font-size: 0.8em; color: var(--tag-color); margin-top: 2px; }

  .tag { color: #b08d5c; font-style: italic; font-weight: normal; }
  .tag-arch { color: var(--arch-color); font-weight: bold; font-style: normal; }
  .tag-occ { color: var(--occ-color); font-weight: bold; font-style: normal; }

  .input-wrapper { display: flex; flex-direction: column; align-items: flex-end; }
  input[type="number"] { width: 70px; padding: 6px; background: #1a1a1a; color: white; border: 1px solid #555; border-radius: 4px; font-size: 1.1em; text-align: center;}
  
  .spent-breakdown { font-size: 0.7em; color: #888; margin-top: 4px; }
  .spent-z { color: var(--good); }
  .spent-a { color: var(--arch-color); }
  .spent-w { color: var(--occ-color); }

  .warning { color: var(--danger) !important; border-color: var(--danger) !important; }
</style>
</head>
<body>
<div class="container">

          <option value="bokser">Bokser/Zapaśnik</option>
          <option value="chuligan">Chuligan</option>
          <option value="plemienny">Człowiek plemienny</option>
          <option value="detektyw_ag">Detektyw agencji</option>
          <option value="detektyw_pol">Detektyw policyjny</option>
          <option value="duchowny">Duchowny</option>
          <option value="dzialacz">Działacz związkowy</option>

          <option value="kierowca">Kierowca ucieczkowy</option>

          <option value="lowca_zwierz">Łowca grubego zwierza</option>
          <option value="lowca_nagrod">Łowca nagród</option>
          <option value="marynarz">Marynarz</option>
          <option value="mechanik">Mechanik</option>
          <option value="misjonarz">Misjonarz</option>
          <option value="muzyk">Muzyk</option>

        <div id="occup-desc" class="desc">Brak zawodowych pkt.</div>

</div>

<script>
  const INTERPERSONAL = ['gadanina', 'perswazja', 'urok_osobisty', 'zastraszanie'];
  const FIREARMS = ['bron_ciezka', 'bron_krotka', 'karabin_maszynowy', 'karabin_strzelba', 'luk', 'miotacz_ognia', 'pistolet_maszynowy'];
  const MELEE = ['bicz', 'bijatyka', 'bron_obuchowa', 'garota', 'miecz', 'pila_lancuchowa', 'topor_siekiera', 'wlocznia'];
  const SCIENCES = ['nauka', 'antropologia', 'archeologia', 'kryptografia'];
  const SURVIVAL = ['sztuka_przetrwania'];
  const ART = ['sztuka_rzemioslo', 'charakteryzacja'];
  const PILOT = ['pilotowanie'];
  const LANG = ['jezyk_obcy'];

  const archetypes = {
    "autsajder": { desc: "Autsajder żyje obok reszty społeczeństwa. Często ciągle w podróży, wykorzystuje tajemną lub obcą wiedzę, by osiągnąć swoje cele.", suggested: "Artysta, Człowiek plemienny, Odkrywca, Okultysta, Pielęgniarz/Pielęgniarka, Płatny zbir, Pracownik tymczasowy, Robotnik, Strażnik leśny, Tramp.", skills: [...LANG, 'medycyna', 'nasluchiwanie', 'nawigacja', 'pierwsza_pomoc', ...ART, ...SURVIVAL, 'tresura_zwierzat', 'tropienie', 'ukrywanie', ...MELEE, 'zastraszanie'] },
    "awanturnik": { desc: "Świat jest ogromny i pełen okazji do okrycia się chwałą. Awanturnik pragnie emocji, rozrywki i coraz to nowych wyzwań.", suggested: "Aktor, Archeolog, Atleta, Bogaty hobbysta, Człowiek plemienny, Dziennikarz śledczy, Fotograf, Gangster, Hazardzista, Kasiarz, Lotnik, Łowca grubego zwierza, Marynarz, Misjonarz, Pielęgniarz/Pielęgniarka, Strażnik leśny, Tramp, Włamywacz, Włóczęga, Żołnierz.", skills: [...FIREARMS, 'jezdziectwo', ...LANG, 'mechanika', 'nurkowanie', 'pierwsza_pomoc', ...PILOT, 'plywanie', 'prowadzenie_samochodu', 'skakanie', ...SURVIVAL, 'ukrywanie', ...MELEE, 'wspinaczka'] },
    "bezwzgledny": { desc: "Człowiek racjonalny zdolny do praktycznie wszystkiego. Chłodne, ponure spojrzenie na ludzkość. Jeśli poweźmie cel, nie cofnie się przed niczym.", suggested: "Agent federalny, Chuligan, Człowiek plemienny, Dziewczyna gangstera, Egzorcysta, Fanatyk, Gangster, Gliniarz, Kasiarz, Łowca nagród, Płatny zbir, Profesor, Przywódca kultu, Reporter, Tramp, Zabójca, Żołnierz.", skills: [...FIREARMS, 'charakteryzacja', 'historia', 'mechanika', 'nasluchiwanie', 'pierwsza_pomoc', 'prawo', 'psychologia', ...ART, ...SURVIVAL, 'tropienie', 'ukrywanie', ...MELEE, 'zastraszanie'] },
    "bojownik": { desc: "Poczucie sprawiedliwości ma we krwi. Silny kompas moralny, chroni słabszych i stawia dobro innych ponad swoje własne.", suggested: "Agent federalny, Atleta, Człowiek plemienny, Detektyw policyjny, Duchowny, Dżentelmen/Dama, Egzorcysta, Funkcjonariusz publiczny, Gliniarz, Lekarz, Lokaj, Marynarz, Misjonarz, Pielęgniarka, Prywatny detektyw, Reporter, Szofer, Żołnierz.", skills: ['bron_krotka', 'historia', 'jezdziectwo', 'ksiegowosc', 'nawigacja', 'perswazja', 'pierwsza_pomoc', 'prawo', 'prowadzenie_samochodu', 'psychologia', 'spostrzegawczosc', ...SURVIVAL, ...MELEE, 'wiedza_o_naturze', 'zastraszanie'] },
    "bonvivant": { desc: "Lubi i umie się bawić, korzysta z życia na całego i nie dba o konsekwencje. Dusza towarzystwa, zawsze w centrum uwagi.", suggested: "Aktor, Artysta, Artysta estradowy, Bogaty hobbysta, Duchowny, Dziewczyna gangstera, Dżentelmen/Dama, Fanatyk, Funkcjonariusz publiczny, Hazardzista, Lokaj, Muzyk, Oficer wojskowy, Oszust, Profesor, Przywódca kultu.", skills: ['gadanina', ...LANG, 'nasluchiwanie', 'psychologia', 'spostrzegawczosc', ...ART, 'urok_osobisty', 'wycena'] },
    "buntownik": { desc: "Szydzący z konwenansów nonkonformista, otwarcie kwestionujący władzę. Bawi go robienie rzeczy wprawiających innych w zakłopotanie.", suggested: "Artysta, Artysta estradowy, Bogaty hobbysta, Hazardzista, Kasiarz, Kierowca ucieczkowy, Oszust, Student, Szpieg, Włamywacz.", skills: ['charakteryzacja', 'czytanie_z_ruchu_warg', 'gadanina', 'prawo', 'psychologia', 'spostrzegawczosc', ...ART, 'slusarstwo', 'ukrywanie', 'urok_osobisty', 'wycena'] },
    "femmefatale": { desc: "Śmiertelnie niebezpieczna(y), oszałamiająco piękna(y) i samolubna(y). Tka lepką sieć i precyzyjnie uderza w swoje ofiary.", suggested: "Agent federalny, Aktor, Artysta estradowy, Bogaty hobbysta, Detektyw agencji, Dziennikarz śledczy, Dziewczyna gangstera, Fanatyk, Funkcjonariusz publiczny, Gangster, Muzyk, Oszust, Pielęgniarka, Pisarz, Prostytutka, Prywatny detektyw, Reporter, Szpieg, Włamywacz, Zabójca.", skills: ['bron_krotka', 'charakteryzacja', 'gadanina', 'nasluchiwanie', 'prowadzenie_samochodu', 'psychologia', ...ART, 'ukrywanie', 'urok_osobisty', 'bijatyka', 'wycena', 'zreczne_palce'] },
    "intrygant": { desc: "Czarujący manipulator. Swe motywy ukrywa za kłamstwami, często czerpiąc przyjemność z samego siania zamętu.", suggested: "Aktor, Artysta, Artysta estradowy, Barman/Kelnerka, Bogaty hobbysta, Detektyw agencji, Działacz związkowy, Dżentelmen/Dama, Fanatyk, Funkcjonariusz publiczny, Hazardzista, Muzyk, Oszust, Przywódca kultu, Reporter, Sekretarz/Sekretarka.", skills: ['charakteryzacja', 'gadanina', ...LANG, 'nasluchiwanie', 'perswazja', 'psychologia', 'skakanie', ...ART, 'ukrywanie', 'urok_osobisty', 'wspinaczka', 'zreczne_palce'] },
    "lowca": { desc: "Ściga swoją ofiarę z pełną bezwzględnością. Czeka na dogodną okazję, gardząc brawurą. Łowów pragnie dla zapanowania nad otoczeniem.", suggested: "Bokser, Detektyw agencji, Detektyw policyjny, Działacz związkowy, Dziewczyna gangstera, Gangster, Gliniarz, Kasiarz, Łowca nagród, Prywatny detektyw, Robotnik, Strażnik leśny.", skills: ['bron_ciezka', 'bron_krotka', 'karabin_strzelba', 'luk', 'nasluchiwanie', 'nawigacja', 'pierwsza_pomoc', 'plywanie', 'spostrzegawczosc', ...SURVIVAL, 'tresura_zwierzat', 'tropienie', 'ukrywanie', ...MELEE, 'wiedza_o_naturze'] },
    "marzyciel": { desc: "Idealista o olbrzymiej wyobraźni. Spogląda poza rzeczy przyziemne w pragnieniu naprawienia świata i krzywd.", suggested: "Artysta, Barman/Kelnerka, Bibliotekarz, Bogaty hobbysta, Człowiek plemienny, Duchowny, Dżentelmen/Dama, Funkcjonariusz publiczny, Hazardzista, Muzyk, Okultysta, Pielęgniarka, Pisarz, Profesor, Prostytutka, Przywódca kultu, Sekretarz/Sekretarka, Student, Tramp, Włóczęga.", skills: ['historia', ...LANG, 'korzystanie_z_bibliotek', 'nasluchiwanie', 'okultyzm', ...ART, 'urok_osobisty', 'wiedza_o_naturze'] },

    chars: {}, skills: {},
    cr: { current: 0, z: 0, w: 0 },

  const charsContainer = document.getElementById('characteristics-list');
  charIds.forEach((id, index) => {
    charsContainer.innerHTML += `
      <div class="stat-row">
        <label for="${id}">${charNames[index]}</label>
        <input type="number" id="${id}" value="0" min="0" max="90">
      </div>`;
  });

  const skillsContainer = document.getElementById('skills-list');
  function renderSkills() {
    skillsContainer.innerHTML = '';
    skillsData.forEach(skill => {
      const s = state.skills[skill.id];
      let tagsHtml = '';
      if (s.isArch) tagsHtml += `<span class="tag tag-arch">[Arch]</span> `;
      if (s.isOcc) tagsHtml += `<span class="tag tag-occ">[Zaw]</span>`;
      
      const val = s.currentBase + s.z + s.a + s.w;

      skillsContainer.innerHTML += `
        <div class="stat-row">
          <div class="skill-label">
            <label class="skill-name" for="${skill.id}">${skill.name} ${tagsHtml}</label>
            <span class="skill-meta">Baza: <span id="${skill.id}-base">${s.currentBase}</span>%</span>
          </div>
          <div class="input-wrapper">
            <input type="number" id="${skill.id}" class="skill-input" value="${val}" min="${s.currentBase}" max="99">
            <div class="spent-breakdown">Z: <span class="spent-z">${s.z}</span> | A: <span class="spent-a">${s.a}</span> | W: <span class="spent-w">${s.w}</span></div>
          </div>
        </div>`;
    });
    document.querySelectorAll('.skill-input').forEach(inp => inp.addEventListener('change', handleSkillChange));
  }

  function updateDynamicBases() {
    state.skills['jezyk_ojczysty'].currentBase = state.chars['edu'];
    state.skills['unik'].currentBase = Math.floor(state.chars['dex'] / 2);
  }

  function handleCharChange(e) {
    let val = parseInt(e.target.value) || 0;
    if(val < 0) { val = 0; e.target.value = 0; }
    state.chars[e.target.id] = val;
    calculateAndRender();
  }

  function handleCRChange(e) {
    let newVal = parseInt(e.target.value);
    if(isNaN(newVal) || newVal < 0) newVal = 0;
    if(newVal > 99) newVal = 99;

    let delta = newVal - (state.cr.z + state.cr.w);
    if(delta === 0) return;

    const mode = document.querySelector('input[name="spend-mode"]:checked').value;
    
    if (mode === 'occupation') {
        if(state.activeOccup === 'none') { e.target.value = state.cr.z + state.cr.w; return; }
        state.cr.w += delta;
        if(state.cr.w < 0) state.cr.w = 0;
    } else if (mode === 'interest') {
        state.cr.z += delta;
        if(state.cr.z < 0) state.cr.z = 0;
    } else {
        e.target.value = state.cr.z + state.cr.w; return;
    }
    calculateAndRender();
  }

  function handleSkillChange(e) {
    const id = e.target.id;
    const s = state.skills[id];
    let newVal = parseInt(e.target.value);
    if (isNaN(newVal) || newVal < s.currentBase) newVal = s.currentBase;

    let delta = newVal - (s.currentBase + s.z + s.a + s.w);
    if (delta === 0) return;

    const mode = document.querySelector('input[name="spend-mode"]:checked').value;

    if (mode === 'archetype') {
      if (!s.isArch) { e.target.value = s.currentBase + s.z + s.a + s.w; return; }
      s.a += delta; if (s.a < 0) s.a = 0;
    } else if (mode === 'occupation') {
      
      // Specjalna logika dla "dowolnych umiejętności"
      if (!s.isOcc) { 
        let allowedAny = 0;
        if (state.activeOccup !== 'none') {
            allowedAny = occupations[state.activeOccup].any || 0;
        }

        if (allowedAny > 0) {
          let nonOccSpentCount = 0;
          for (let k in state.skills) {
            if (!state.skills[k].isOcc && state.skills[k].w > 0) {
              nonOccSpentCount++;
            }
          }
          // Jeśli to nowa umiejętność (dotychczas było na niej 0 w) i przekracza limit - blokujemy
          if (s.w === 0 && delta > 0 && nonOccSpentCount >= allowedAny) {
            alert(`Twój zawód pozwala na wydawanie punktów z puli Zawodu tylko na ${allowedAny} dodatkową/e umiejętność(ci) spoza standardowej listy.`);
            e.target.value = s.currentBase + s.z + s.a + s.w;
            return;
          }
        } else {
           // Jeśli zawód w ogóle nie pozwala na dowolne umiejętności
           e.target.value = s.currentBase + s.z + s.a + s.w; 
           return; 
        }
      }
      
      s.w += delta; if (s.w < 0) s.w = 0;
    } else {
      s.z += delta; if (s.z < 0) s.z = 0;
    }
    calculateAndRender();
  }

  function evalOccFormula(occKey) {
    if (occKey === 'none') return 0;
    const occ = occupations[occKey];
    
    const str = state.chars['str'] || 0; const con = state.chars['con'] || 0;
    const siz = state.chars['siz'] || 0; const dex = state.chars['dex'] || 0;
    const app = state.chars['app'] || 0; const int = state.chars['int'] || 0;
    const pow = state.chars['pow'] || 0; const edu = state.chars['edu'] || 0;
    
    let total = eval(occ.fixed) || 0;
    
    if (occ.choice) {
       const choiceFormula = document.getElementById('occ-stat-select').value;
       if(choiceFormula) {
         total += eval(choiceFormula) || 0;
       }
    }
    
    return total;
  }

  function handleSelectors() {
    const archKey = document.getElementById('archetype-select').value;
    state.activeArchetype = archKey;
    document.getElementById('mode-arch').disabled = (archKey === 'none');
    
    if(archKey === 'none') {
      document.getElementById('archetype-desc').innerHTML = "Brak (0 pkt)";
    } else {
      const arch = archetypes[archKey];
      document.getElementById('archetype-desc').innerHTML = `${arch.desc} <span class="desc-accent">Sugerowane zawody:</span> ${arch.suggested}`;
    }

    const occKey = document.getElementById('occup-select').value;
    state.activeOccup = occKey;
    document.getElementById('mode-occ').disabled = (occKey === 'none');
    
    const choiceBox = document.getElementById('occ-choice-box');
    const selectBox = document.getElementById('occ-stat-select');
    
    Object.keys(state.skills).forEach(k => { state.skills[k].isArch = false; state.skills[k].isOcc = false; });
    
    if(archKey !== 'none') {
      archetypes[archKey].skills.forEach(id => { if(state.skills[id]) state.skills[id].isArch = true; });
    }

    if(occKey !== 'none') {
      const o = occupations[occKey];
      let anyText = o.any > 0 ? ` (+ ${o.any} dowolna/e)` : "";
      
      document.getElementById('occup-desc').innerHTML = `Wzór: <strong>${o.desc}</strong>${anyText} <br><span class="desc-occ">Sugerowane kontakty:</span> ${o.cnt}`;
      state.crReq = o.cr;
      o.skills.forEach(id => { if(state.skills[id]) state.skills[id].isOcc = true; });
      
      if (o.choice) {
        choiceBox.style.display = 'block';
        if (selectBox.getAttribute('data-last-occ') !== occKey) {
            selectBox.innerHTML = '';
            o.choice.forEach((formulaStr, i) => {
                const opt = document.createElement('option');
                opt.value = formulaStr;
                opt.textContent = o.labels[i];
                selectBox.appendChild(opt);
            });
            selectBox.setAttribute('data-last-occ', occKey);
        }
      } else {
        choiceBox.style.display = 'none';
        selectBox.innerHTML = '';
        selectBox.setAttribute('data-last-occ', '');
      }

    } else {
      document.getElementById('occup-desc').innerHTML = "Brak zawodowych pkt.";
      state.crReq = [0, 99];
      choiceBox.style.display = 'none';
    }
    
    calculateAndRender();
  }

  function calculateAndRender() {
    updateDynamicBases();

    let charSum = Object.values(state.chars).reduce((a, b) => a + b, 0);
    const remChar = state.maxCharPoints - charSum;
    document.getElementById('char-points').textContent = remChar;
    document.getElementById('char-pool-container').classList.toggle('warning', remChar < 0);

    let totalCr = state.cr.z + state.cr.w;
    document.getElementById('cr-input').value = totalCr;
    document.getElementById('cr-z').textContent = state.cr.z;
    document.getElementById('cr-w').textContent = state.cr.w;
    document.getElementById('cr-meta').textContent = `Wymagane: ${state.crReq[0]} - ${state.crReq[1]}`;
    document.getElementById('cr-input').classList.toggle('warning', (totalCr < state.crReq[0] || totalCr > state.crReq[1]));

    state.maxOccPoints = evalOccFormula(state.activeOccup);
    const maxSkillPoints = state.chars['int'] * 2;
    
    let spentZ = state.cr.z; let spentA = 0; let spentW = state.cr.w;
    Object.values(state.skills).forEach(s => { spentZ += s.z; spentA += s.a; spentW += s.w; });

    const remZ = maxSkillPoints - spentZ;
    const remA = state.maxArchPoints - spentA;
    const remW = state.maxOccPoints - spentW;

    document.getElementById('max-skill-points').textContent = maxSkillPoints;
    document.getElementById('skill-points').textContent = remZ;
    document.getElementById('skill-pool-container').classList.toggle('warning', remZ < 0);

    document.getElementById('max-arch-points').textContent = state.activeArchetype !== 'none' ? 100 : 0;
    document.getElementById('arch-points').textContent = remA;
    if(state.activeArchetype !== 'none') document.getElementById('arch-pool-container').classList.toggle('warning', remA < 0);

    document.getElementById('max-occ-points').textContent = state.maxOccPoints;
    document.getElementById('occ-points').textContent = remW;
    if(state.activeOccup !== 'none') document.getElementById('occ-pool-container').classList.toggle('warning', remW < 0);

    renderSkills();
  }

  function exportData() {
    const dataToSave = {
      chars: state.chars,
      cr: state.cr,
      activeArchetype: state.activeArchetype,
      activeOccup: state.activeOccup,
      occStatChoice: document.getElementById('occ-stat-select').value,
      skillsSpent: {}
    };

    for (let key in state.skills) {
      if(state.skills[key].z > 0 || state.skills[key].a > 0 || state.skills[key].w > 0) {
        dataToSave.skillsSpent[key] = {
          z: state.skills[key].z,
          a: state.skills[key].a,
          w: state.skills[key].w
        };
      }
    }

    const blob = new Blob([JSON.stringify(dataToSave, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'pulp_cthulhu_postac.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(event) {
      try {
        const data = JSON.parse(event.target.result);
        
        if(data.chars) {
          state.chars = data.chars;
          for(let id in state.chars) {
            const input = document.getElementById(id);
            if(input) input.value = state.chars[id];
          }
        }

        document.getElementById('archetype-select').value = data.activeArchetype || 'none';
        document.getElementById('occup-select').value = data.activeOccup || 'none';
        handleSelectors(); 
        
        if(data.occStatChoice) {
          document.getElementById('occ-stat-select').value = data.occStatChoice;
        }

        if(data.cr) state.cr = data.cr;
        
        for(let k in state.skills) {
          state.skills[k].z = 0; state.skills[k].a = 0; state.skills[k].w = 0;
        }

        if(data.skillsSpent) {
          for (let key in data.skillsSpent) {
            if (state.skills[key]) {
              state.skills[key].z = data.skillsSpent[key].z || 0;
              state.skills[key].a = data.skillsSpent[key].a || 0;
              state.skills[key].w = data.skillsSpent[key].w || 0;
            }
          }
        }

        calculateAndRender();
        
      } catch(err) {
        alert('Wystąpił błąd podczas odczytu pliku JSON. Upewnij się, że plik nie jest uszkodzony.');
        console.error(err);
      }
      
      e.target.value = '';
    };
    
    reader.readAsText(file);
  }

  document.getElementById('occ-stat-select').addEventListener('change', calculateAndRender);
  document.getElementById('archetype-select').addEventListener('change', () => { handleSelectors(); document.querySelector('input[value="interest"]').checked = true; });
  document.getElementById('occup-select').addEventListener('change', () => { handleSelectors(); document.querySelector('input[value="interest"]').checked = true; });
  document.querySelectorAll('#characteristics-list input').forEach(inp => inp.addEventListener('change', handleCharChange));
  document.getElementById('cr-input').addEventListener('change', handleCRChange);
  
  calculateAndRender();
</script>
</body>
